<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VoiceUp — Notifications</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    .notif-item {
      background: var(--navy2); border: 1px solid var(--border);
      border-radius: 10px; padding: 16px; margin-bottom: 10px;
      display: flex; gap: 14px; align-items: flex-start;
      transition: border-color .15s; cursor: default;
    }
    .notif-item.unread { border-color: rgba(245,166,35,.3); background: rgba(245,166,35,.03); }
    .notif-icon {
      width: 36px; height: 36px; border-radius: 8px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .notif-icon.info    { background: rgba(59,130,246,.12); color: var(--blue); }
    .notif-icon.success { background: rgba(34,197,94,.12);  color: var(--green); }
    .notif-icon.warning { background: rgba(245,166,35,.12); color: var(--amber); }
    .notif-icon.danger  { background: rgba(239,68,68,.12);  color: var(--red); }
    .notif-body { flex: 1; }
    .notif-msg  { font-size: 13px; line-height: 1.55; }
    .notif-time { font-size: 10px; color: var(--muted); margin-top: 5px; }
    .unread-dot { width: 7px; height: 7px; background: var(--amber); border-radius: 50%; flex-shrink: 0; margin-top: 5px; }
    .mark-all { font-size: 12px; color: var(--amber); cursor: pointer; }
    .mark-all:hover { text-decoration: underline; }
    .empty-state { text-align: center; padding: 60px 20px; color: var(--muted); }
  </style>
</head>
<body>
<div id="toast-container"></div>
<div class="app-layout">
  <nav class="sidebar">
    <div class="sb-logo"><svg viewBox="0 0 24 24" fill="none" stroke="#07101f" stroke-width="2.5" stroke-linecap="round" width="18" height="18"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg></div>
    <a href="student.html" class="sb-link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg></a>
    <a href="form.html" class="sb-link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></a>
    <a href="status.html" class="sb-link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg></a>
    <div class="sb-divider"></div>
    <div class="sb-bottom">
      <a href="notifications.html" class="sb-link active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg></a>
      <a class="sb-link" onclick="signOut()" style="cursor:pointer"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></a>
    </div>
  </nav>

  <main class="main">
    <div class="page-header flex justify-between items-center">
      <div>
        <div class="page-title">Notifications</div>
        <div class="page-sub" id="unread-count">Loading...</div>
      </div>
      <span class="mark-all" onclick="markAllRead()">Mark all as read</span>
    </div>
    <div id="notif-list"><div class="empty-state">Loading...</div></div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="config.js"></script>
<script>
  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, { auth: { persistSession: true, autoRefreshToken: true, storageKey: 'voiceup-session' } });
  let userId = null;
  let notifs = [];

  async function init() {
    const { data: { user } } = await sb.auth.getUser();
    if (!user) return window.location.href = 'index.html';
    const { data: p } = await sb.from('users').select('id').eq('auth_id', user.id).maybeSingle();
    if (!p) return window.location.href = 'index.html';
    userId = p.id;
    await loadNotifs();
  }

  async function loadNotifs() {
    const { data } = await supabase
      .from('notifications').select('*')
      .eq('user_id', userId)
      .order('created_at', { ascending: false });
    notifs = data || [];
    render();
    // Mark all as read after 2s
    setTimeout(markAllRead, 2000);
  }

  function render() {
    const unread = notifs.filter(n => !n.is_read).length;
    document.getElementById('unread-count').textContent =
      unread > 0 ? `${unread} unread notification${unread > 1 ? 's' : ''}` : 'All caught up';

    const list = document.getElementById('notif-list');
    if (!notifs.length) {
      list.innerHTML = `<div class="empty-state">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="opacity:.3;margin-bottom:12px"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        <div>No notifications yet</div></div>`;
      return;
    }

    list.innerHTML = notifs.map(n => {
      const type = getType(n.message);
      const icon = getIcon(type);
      const time = new Date(n.created_at).toLocaleString('en-IN', { day:'numeric', month:'short', hour:'2-digit', minute:'2-digit' });
      return `
      <div class="notif-item ${n.is_read ? '' : 'unread'}" id="notif-${n.id}">
        <div class="notif-icon ${type}">${icon}</div>
        <div class="notif-body">
          <div class="notif-msg">${n.message}</div>
          <div class="notif-time">${time}</div>
        </div>
        ${!n.is_read ? '<div class="unread-dot"></div>' : ''}
      </div>`;
    }).join('');
  }

  function getType(msg) {
    if (msg.includes('approved') || msg.includes('action is being taken')) return 'success';
    if (msg.includes('false') || msg.includes('restricted') || msg.includes('ban')) return 'danger';
    if (msg.includes('filed') || msg.includes('complaint')) return 'warning';
    return 'info';
  }

  function getIcon(type) {
    const icons = {
      success: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>',
      danger:  '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/></svg>',
      warning: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/></svg>',
      info:    '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>',
    };
    return icons[type];
  }

  async function markAllRead() {
    await sb.from('notifications').update({ is_read: true }).eq('user_id', userId).eq('is_read', false);
    notifs = notifs.map(n => ({ ...n, is_read: true }));
    render();
  }

  async function signOut() { await sb.auth.signOut(); window.location.href = 'index.html'; }
  init();
</script>
</body>
</html>
