<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VoiceUp — Complaint Status</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    .status-card { background: var(--navy2); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 14px; }
    .status-head { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 14px; }
    .status-id { font-size: 10px; color: var(--muted); font-family: monospace; margin-top: 3px; }
    .timeline { padding-left: 20px; border-left: 1px solid var(--border); }
    .tl-step { position: relative; padding-bottom: 18px; }
    .tl-step:last-child { padding-bottom: 0; }
    .tl-dot {
      position: absolute; left: -26px; top: 2px;
      width: 10px; height: 10px; border-radius: 50%;
      background: var(--navy3); border: 2px solid var(--border);
    }
    .tl-dot.done   { background: var(--amber); border-color: var(--amber); }
    .tl-dot.active { background: var(--blue);  border-color: var(--blue); }
    .tl-dot.green  { background: var(--green); border-color: var(--green); }
    .tl-dot.red    { background: var(--red);   border-color: var(--red); }
    .tl-label { font-size: 12px; font-weight: 500; }
    .tl-sub { font-size: 10px; color: var(--muted); margin-top: 2px; }
  </style>
</head>
<body>
<div id="toast-container"></div>
<div class="app-layout">
  <nav class="sidebar">
    <div class="sb-logo"><svg viewBox="0 0 24 24" fill="none" stroke="#07101f" stroke-width="2.5" stroke-linecap="round" width="18" height="18"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg></div>
    <a href="student.html" class="sb-link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg></a>
    <a href="form.html" class="sb-link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></a>
    <a href="status.html" class="sb-link active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg></a>
    <div class="sb-divider"></div>
    <div class="sb-bottom"><a class="sb-link" onclick="signOut()" style="cursor:pointer"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></a></div>
  </nav>

  <main class="main">
    <div class="page-header">
      <div class="page-title">Complaint <span>status</span></div>
      <div class="page-sub">Track the progress of all your filed complaints</div>
    </div>
    <div id="status-list"><div style="text-align:center;color:var(--muted);padding:40px">Loading...</div></div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="config.js"></script>
<script>
  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  async function init() {
    const { data: { user } } = await sb.auth.getUser();
    if (!user) return window.location.href = 'index.html';
    const { data: p } = await sb.from('users').select('*').eq('auth_id', user.id).single();
    if (!p) return window.location.href = 'index.html';

    const { data: complaints } = await supabase
      .from('complaints').select('*')
      .eq('complainant_id', p.id)
      .order('created_at', { ascending: false });

    const list = document.getElementById('status-list');
    if (!complaints?.length) {
      list.innerHTML = `<div style="text-align:center;color:var(--muted);padding:48px">No complaints filed yet. <a href="form.html">File one now</a></div>`;
      return;
    }

    list.innerHTML = complaints.map(c => {
      const steps = buildSteps(c);
      return `
      <div class="status-card">
        <div class="status-head">
          <div>
            <div style="font-size:13px;font-weight:500">Against: ${c.accused_name}</div>
            <div class="status-id">#${c.id.split('-')[0].toUpperCase()}</div>
          </div>
          <span class="badge badge-${c.status.toLowerCase().replace('_','-')}">${c.status.replace('_',' ')}</span>
        </div>
        <div class="timeline">
          ${steps.map(s => `
          <div class="tl-step">
            <div class="tl-dot ${s.dotClass}"></div>
            <div class="tl-label" style="color:${s.color || 'var(--text)'}">${s.label}</div>
            <div class="tl-sub">${s.sub}</div>
          </div>`).join('')}
        </div>
      </div>`;
    }).join('');
  }

  function buildSteps(c) {
    const fmt = d => new Date(d).toLocaleDateString('en-IN', { day:'numeric', month:'short', year:'numeric' });
    const steps = [
      { label: 'Submitted', sub: fmt(c.created_at), dotClass: 'done' }
    ];

    if (c.status === 'AI_Rejected') {
      steps.push({ label: 'AI validation failed', sub: c.ai_rejection_reason || 'Flagged as invalid', dotClass: 'red', color: 'var(--red)' });
    } else {
      steps.push({ label: `AI validated — ${c.ai_severity || '—'} severity`, sub: `Category: ${c.ai_category || '—'}`, dotClass: 'done' });
      if (c.status === 'Pending') {
        steps.push({ label: 'Awaiting admin review', sub: 'In queue', dotClass: 'active', color: 'var(--blue)' });
      } else if (c.status === 'Approved') {
        steps.push({ label: 'Reviewed by authority', sub: fmt(c.reviewed_at), dotClass: 'done' });
        steps.push({ label: 'Action taken — complaint approved', sub: 'Accused has been notified through the platform', dotClass: 'green', color: 'var(--green)' });
      } else if (c.status === 'Fake') {
        steps.push({ label: 'Marked as false complaint', sub: fmt(c.reviewed_at), dotClass: 'red', color: 'var(--red)' });
        steps.push({ label: '1-month account restriction applied', sub: 'You cannot file complaints during this period', dotClass: 'red', color: 'var(--red)' });
      }
    }
    return steps;
  }

  async function signOut() { await sb.auth.signOut(); window.location.href = 'index.html'; }
  init();
</script>
</body>
</html>
